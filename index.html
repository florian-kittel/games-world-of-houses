<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c1014">
  <meta name="description" content="World of Houses — Echtzeit-Strategiespiel im Browser">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="World of Houses">
  <meta name="mobile-web-app-capable" content="yes">
  <title>World of Houses</title>
  <link rel="stylesheet" href="css/style.css?v=2026061302">
</head>
<body>
  <div id="start-screen"></div>

  <div id="app">
    <header id="topbar"></header>
    <div id="stage">
      <main id="content">
        <section id="map-view"><canvas id="map-canvas"></canvas>
          <div id="map-hint">Ziehen zum Verschieben · Mausrad zum Zoomen · Burg/Struktur anklicken · <b>Doppelklick öffnet die Burgansicht</b></div>
        </section>
      </main>
      <button id="sidebar-toggle" title="Seitenleiste ein-/ausblenden" aria-label="Seitenleiste">☰</button>
      <aside id="sidebar"></aside>
      <div id="sidebar-backdrop"></div>
    </div>
    <footer id="statusbar"><span id="save-status">—</span></footer>
  </div>

  <!-- Dorfansicht als modales Overlay über der Karte -->
  <div id="village-overlay" class="overlay" style="display:none">
    <div class="overlay-backdrop"></div>
    <div class="overlay-card">
      <div class="overlay-head">
        <span id="overlay-title">Dorf</span>
        <button id="overlay-close" title="Schließen (Esc)">✕</button>
      </div>
      <div id="village-body"></div>
    </div>
  </div>

  <!-- Kampfbericht-Overlay -->
  <div id="battle-overlay" class="overlay" style="display:none">
    <div class="overlay-backdrop"></div>
    <div class="overlay-card battle-card">
      <div class="overlay-head">
        <span id="battle-title">Kampfbericht</span>
        <button id="battle-close" title="Schließen (Esc)">✕</button>
      </div>
      <div id="battle-body"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/config.js?v=2026061302"></script>
  <script src="js/rng.js?v=2026061302"></script>
  <script src="js/houses.js?v=2026061302"></script>
  <script src="js/mapgen.js?v=2026061302"></script>
  <script src="js/atlas.js?v=2026061302"></script>
  <script src="js/sprites.js?v=2026061302"></script>
  <script src="js/village.js?v=2026061302"></script>
  <script src="js/combat.js?v=2026061302"></script>
  <script src="js/game.js?v=2026061302"></script>
  <script src="js/ai.js?v=2026061302"></script>
  <script src="js/persistence.js?v=2026061302"></script>
  <script src="js/ui.js?v=2026061302"></script>
  <script src="js/main.js?v=2026061302"></script>
</body>
</html>
